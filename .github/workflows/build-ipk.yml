name: Build IPK Package

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up build environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential git wget unzip python3

      - name: Generate version & changelog
        id: version
        run: |
          # ── Versi otomatis dari jumlah commit ─────────────────────────
          COMMIT_COUNT=$(git rev-list --count HEAD)
          MAJOR=1
          MINOR=$(( COMMIT_COUNT / 10 ))
          PATCH=$(( COMMIT_COUNT % 10 ))
          AUTO_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          RELEASE=1
          DATE=$(date '+%Y-%m-%d')

          echo "version=${AUTO_VERSION}" >> $GITHUB_OUTPUT
          echo "release=${RELEASE}"      >> $GITHUB_OUTPUT
          echo "date=${DATE}"            >> $GITHUB_OUTPUT
          echo "tag=v${AUTO_VERSION}"    >> $GITHUB_OUTPUT

          # ── Update versi di Makefile ───────────────────────────────────
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=${AUTO_VERSION}/" Makefile
          sed -i "s/^PKG_RELEASE:=.*/PKG_RELEASE:=${RELEASE}/"      Makefile

          # ── Changelog dari commit messages ─────────────────────────────
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"* %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"* %s" --no-merges -20)
          fi
          [ -z "$COMMITS" ] && COMMITS="* Initial release"

          cat > /tmp/changelog.md << CHANGELOG
          v${AUTO_VERSION} — ${DATE}

          **Perubahan**
          ${COMMITS}

          **Info Build**
          * Commit: \`${{ github.sha }}\`
          * Branch: \`${{ github.ref_name }}\`
          * Build: \`#${{ github.run_number }}\`

          ---
          **Cara Install**
          \`\`\`bash
          scp luci-app-aria2-bot-IRF_*.ipk root@192.168.1.1:/tmp/
          ssh root@192.168.1.1 "opkg install /tmp/luci-app-aria2-bot-IRF_*.ipk"
          \`\`\`
          Lalu buka LuCI → **Services → Aria2 Bot → Settings**
          CHANGELOG

          echo "changelog_file=/tmp/changelog.md" >> $GITHUB_OUTPUT

      - name: Build IPK
        run: |
          chmod +x scripts/build-ipk.sh
          bash scripts/build-ipk.sh "${{ steps.version.outputs.version }}"

      - name: Rename IPK
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for f in dist/*.ipk; do
            NEW="dist/luci-app-aria2-bot-IRF_${VERSION}_all.ipk"
            [ "$f" != "$NEW" ] && mv "$f" "$NEW" || true
          done
          ls -lh dist/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-aria2-bot-IRF-${{ steps.version.outputs.version }}
          path: dist/*.ipk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Aria2 Bot v${{ steps.version.outputs.version }} (${{ steps.version.outputs.date }}) Latest"
          body_path: /tmp/changelog.md
          files: dist/*.ipk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
