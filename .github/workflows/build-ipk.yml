name: Build IPK Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Required to create releases

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Determine version ─────────────────────────────────────
      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            SHORT=$(git rev-parse --short HEAD)
            VERSION="1.0.0-git${SHORT}"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "PKG_FILE=luci-app-aria2-bot-IRF_${VERSION}_all.ipk" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      # ── 3. Build IPK ─────────────────────────────────────────────
      - name: Build IPK package
        run: |
          chmod +x scripts/build-ipk.sh
          bash scripts/build-ipk.sh "${{ steps.version.outputs.VERSION }}"

      # ── 4. Verify IPK ─────────────────────────────────────────────
      - name: Verify IPK
        run: |
          ls -lh dist/
          file dist/*.ipk
          # Show package contents
          mkdir -p /tmp/ipk-check
          cp dist/*.ipk /tmp/ipk-check/pkg.ar
          cd /tmp/ipk-check
          ar x pkg.ar
          echo "=== control.tar.gz contents ==="
          tar tzf control.tar.gz
          echo "=== data.tar.gz contents ==="
          tar tzf data.tar.gz

      # ── 5. Upload as artifact (every build) ──────────────────────
      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-aria2-bot-IRF-${{ steps.version.outputs.VERSION }}
          path: dist/*.ipk
          retention-days: 30

      # ── 6. Create GitHub Release (only on version tags) ──────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Aria2 Bot ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📦 luci-app-aria2-bot-IRF v${{ steps.version.outputs.VERSION }}

            ### Cara Install di OpenWrt
            ```sh
            # Upload ke router
            scp ${{ steps.version.outputs.PKG_FILE }} root@192.168.1.1:/tmp/

            # Install di router
            ssh root@192.168.1.1 "opkg install /tmp/${{ steps.version.outputs.PKG_FILE }}"
            ```

            ### Dependency Otomatis
            Paket ini akan otomatis menginstall:
            - `python3`, `python3-pip`, `aria2`
            - `python-telegram-bot`, `aiohttp` (via pip3)

            ### Konfigurasi
            Setelah install, buka LuCI → **Services** → **Aria2 Bot** → **Settings**
            dan masukkan Telegram Bot Token serta Chat ID Anda.
          files: dist/*.ipk
          draft: false
          prerelease: false
