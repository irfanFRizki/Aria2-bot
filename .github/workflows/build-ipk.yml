name: Build OpenWrt IPK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'package/aria2bot/**'
      - 'luci-app-aria2bot/**'
      - '.github/workflows/build-ipk.yml'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version to build against'
        required: false
        default: '23.05.3'

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '23.05.3' }}
  # Target Raspberry Pi 4B (ARM64/aarch64)
  TARGET: bcm27xx
  SUBTARGET: bcm2711
  ARCH: aarch64_cortex-a72
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Job 1: Validate structure ─────────────────────────────────────────
  validate:
    name: Validate Package Structure
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking package structure..."
          REQUIRED=(
            "package/aria2bot/Makefile"
            "package/aria2bot/files/usr/bin/telegram_download_bot.py"
            "package/aria2bot/files/etc/init.d/aria2bot"
            "package/aria2bot/files/etc/init.d/aria2rpc"
            "package/aria2bot/files/etc/init.d/aria2"
            "package/aria2bot/files/etc/config/aria2bot"
            "package/aria2bot/files/etc/aria2/aria2.conf"
            "package/aria2bot/files/usr/lib/aria2bot/install_deps.sh"
            "luci-app-aria2bot/Makefile"
            "luci-app-aria2bot/luasrc/controller/aria2bot.lua"
            "luci-app-aria2bot/luasrc/model/cbi/aria2bot/settings.lua"
            "luci-app-aria2bot/luasrc/view/aria2bot/dashboard.htm"
          )
          FAIL=0
          for f in "${REQUIRED[@]}"; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "  ✗ MISSING: $f"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All required files present!" || exit 1

      - name: Validate Python script syntax
        run: |
          python3 -m py_compile package/aria2bot/files/usr/bin/telegram_download_bot.py
          echo "✓ Python syntax OK"

      - name: Check init.d scripts shebang
        run: |
          for f in package/aria2bot/files/etc/init.d/*; do
            head -1 "$f" | grep -q "rc.common" \
              && echo "✓ $f" \
              || { echo "✗ Bad shebang: $f"; exit 1; }
          done

  # ── Job 2: Build IPK for Raspberry Pi 4B ──────────────────────────────
  build:
    name: Build IPK (RPi4 ARM64)
    runs-on: ubuntu-22.04
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses5-dev libncursesw5-dev \
            zlib1g-dev gawk git gettext libssl-dev xsltproc \
            rsync wget unzip python3 python3-distutils \
            file curl zip

      - name: Cache OpenWrt SDK (RPi4)
        uses: actions/cache@v4
        id: cache-sdk
        with:
          path: openwrt-sdk
          key: openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-v1

      - name: Download OpenWrt SDK for Raspberry Pi 4B
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/${{ env.OPENWRT_VERSION }}/targets/${{ env.TARGET }}/${{ env.SUBTARGET }}/openwrt-sdk-${{ env.OPENWRT_VERSION }}-${{ env.TARGET }}-${{ env.SUBTARGET }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          echo ">>> Downloading SDK from:"
          echo "    $SDK_URL"
          wget -q --show-progress "$SDK_URL" -O sdk.tar.xz
          mkdir -p openwrt-sdk
          tar -xf sdk.tar.xz --strip-components=1 -C openwrt-sdk
          rm sdk.tar.xz
          echo ">>> SDK extracted!"

      - name: Setup SDK feeds
        run: |
          cd openwrt-sdk
          cp feeds.conf.default feeds.conf
          # Pastikan luci feed ada
          grep -q "luci" feeds.conf || \
            echo "src-git luci https://github.com/openwrt/luci.git;openwrt-23.05" >> feeds.conf
          echo ">>> Updating feeds..."
          ./scripts/feeds update -a 2>&1 | tail -5
          echo ">>> Installing feeds..."
          ./scripts/feeds install -a 2>&1 | tail -5

      - name: Copy packages into SDK
        run: |
          echo ">>> Copying aria2bot package..."
          cp -r package/aria2bot openwrt-sdk/package/aria2bot
          echo ">>> Copying luci-app-aria2bot package..."
          cp -r luci-app-aria2bot openwrt-sdk/package/luci-app-aria2bot
          echo ">>> Done!"

      - name: Configure SDK
        run: |
          cd openwrt-sdk
          make defconfig 2>/dev/null
          echo "CONFIG_PACKAGE_aria2bot=m"          >> .config
          echo "CONFIG_PACKAGE_luci-app-aria2bot=m" >> .config
          make defconfig 2>/dev/null
          echo ">>> Config done"

      - name: Build aria2bot IPK
        run: |
          cd openwrt-sdk
          echo ">>> Building aria2bot..."
          make package/aria2bot/compile V=s 2>&1 | tee ../build-aria2bot.log
          echo ">>> aria2bot build done"

      - name: Build luci-app-aria2bot IPK
        run: |
          cd openwrt-sdk
          echo ">>> Building luci-app-aria2bot..."
          make package/luci-app-aria2bot/compile V=s 2>&1 | tee ../build-luci.log || true
          echo ">>> luci-app-aria2bot build done"

      - name: Collect IPK files
        run: |
          mkdir -p artifacts
          find openwrt-sdk/bin -name "aria2bot*.ipk" \
            -exec cp {} artifacts/ \; 2>/dev/null || true
          find openwrt-sdk/bin -name "luci-app-aria2bot*.ipk" \
            -exec cp {} artifacts/ \; 2>/dev/null || true

          echo ">>> Built IPKs:"
          ls -lh artifacts/ || echo "No IPK found!"

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-rpi4
          path: |
            build-aria2bot.log
            build-luci.log
          retention-days: 7

      - name: Upload IPK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aria2bot-ipk-rpi4-${{ github.sha }}
          path: artifacts/*.ipk
          if-no-files-found: warn
          retention-days: 30

  # ── Job 3: Release on tag ─────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built IPKs
        uses: actions/download-artifact@v4
        with:
          pattern: aria2bot-ipk-rpi4-*
          merge-multiple: true
          path: release-ipks/

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: List release files
        run: ls -lh release-ipks/ || echo "No files found"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "Aria2 Bot ${{ steps.version.outputs.VERSION }} — OpenWrt RPi4"
          body: |
            ## 🤖 Aria2 Telegram Bot for OpenWrt — ${{ steps.version.outputs.VERSION }}

            **Target:** Raspberry Pi 4B (bcm27xx/bcm2711 · aarch64_cortex-a72)
            **OpenWrt Version:** ${{ env.OPENWRT_VERSION }}

            ---

            ### 📦 Installation

            ```sh
            # Di terminal OpenWrt RPi4 kamu:
            cd /tmp

            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/aria2bot_${{ steps.version.outputs.VERSION }}_all.ipk
            wget https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.VERSION }}/luci-app-aria2bot_${{ steps.version.outputs.VERSION }}_all.ipk

            opkg install aria2bot_*.ipk
            opkg install luci-app-aria2bot_*.ipk
            ```

            ### ⚙️ Setup

            **Via LuCI:**
            1. Buka **Services → Aria2 Bot → Settings**
            2. Masukkan **Telegram Bot Token** dari [@BotFather](https://t.me/BotFather)
            3. Masukkan **Telegram User ID** dari [@userinfobot](https://t.me/userinfobot)
            4. Set **Download Directory** (misal `/mnt/sda1/media`)
            5. **Save & Apply**
            6. Klik **Start Bot** dan **Start Aria2** di tab Dashboard

            **Via SSH/Terminal:**
            ```sh
            uci set aria2bot.settings.bot_token='TOKEN_KAMU'
            uci set aria2bot.settings.allowed_users='USER_ID_KAMU'
            uci set aria2bot.settings.download_dir='/mnt/sda1'
            uci set aria2bot.settings.enabled='1'
            uci commit aria2bot
            /etc/init.d/aria2rpc start && /etc/init.d/aria2bot start
            ```

            ### 📱 Perintah Bot
            | Perintah | Fungsi |
            |----------|--------|
            | Kirim URL | Mulai download |
            | `/status` | Status download aktif |
            | `/start` | Menu utama |
            | `📊 Status Download` | Cek progress |
            | `💾 Info HDD` | Info HDD terdeteksi |

            ### 🔄 Changes
            ${{ github.event.head_commit.message }}
          files: release-ipks/*.ipk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
