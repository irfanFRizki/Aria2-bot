name: Build IPK Package

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set build info
        id: info
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          BUILD_DATE=$(date '+%Y-%m-%d')
          COMMIT=$(git rev-parse HEAD)
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "main")
          BUILD_NUM="${GITHUB_RUN_NUMBER}"
          PKG="luci-app-aria2-bot-IRF_${VERSION}_all.ipk"

          # Daftar file yang berubah di commit terakhir
          CHANGED=""
          while IFS= read -r f; do
            [ -n "$f" ] && CHANGED="${CHANGED}* Update $(basename $f)"$'\n'
          done < <(git diff-tree --no-commit-id -r --name-only HEAD)
          [ -z "$CHANGED" ] && CHANGED="* Initial release"$'\n'

          echo "VERSION=$VERSION"       >> $GITHUB_OUTPUT
          echo "DATE=$BUILD_DATE"       >> $GITHUB_OUTPUT
          echo "COMMIT=$COMMIT"         >> $GITHUB_OUTPUT
          echo "BRANCH=$BRANCH"         >> $GITHUB_OUTPUT
          echo "BUILD_NUM=$BUILD_NUM"   >> $GITHUB_OUTPUT
          echo "PKG=$PKG"               >> $GITHUB_OUTPUT
          { echo "CHANGED<<EOF"; printf '%s' "$CHANGED"; echo "EOF"; } >> $GITHUB_OUTPUT

      - name: Build IPK
        run: |
          chmod +x scripts/build-ipk.sh
          bash scripts/build-ipk.sh "${{ steps.info.outputs.VERSION }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-aria2-bot-IRF-${{ steps.info.outputs.VERSION }}
          path: dist/*.ipk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aria2 Bot v${{ steps.info.outputs.VERSION }} (${{ steps.info.outputs.DATE }}) Latest"
          body: |
            v${{ steps.info.outputs.VERSION }} — ${{ steps.info.outputs.DATE }}

            **Perubahan**
            ${{ steps.info.outputs.CHANGED }}
            **Info Build**
            * Commit: `${{ steps.info.outputs.COMMIT }}`
            * Branch: `${{ steps.info.outputs.BRANCH }}`
            * Build: `#${{ steps.info.outputs.BUILD_NUM }}`
          files: dist/*.ipk
