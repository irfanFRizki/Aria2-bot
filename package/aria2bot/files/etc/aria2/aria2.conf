# Aria2 Configuration File
# Managed by Aria2 Bot package

# RPC Settings
enable-rpc=true
rpc-listen-all=true
rpc-listen-port=6800
rpc-allow-origin-all=true
# rpc-secret=YOUR_SECRET_HERE

# Download Settings
dir=/tmp/downloads
continue=true
max-concurrent-downloads=5
max-connection-per-server=10
split=10
min-split-size=1M
file-allocation=none

# Log
log=/var/log/aria2.log
log-level=warn

# BitTorrent
bt-enable-lpd=true
enable-dht=true
enable-dht6=false
follow-torrent=true
